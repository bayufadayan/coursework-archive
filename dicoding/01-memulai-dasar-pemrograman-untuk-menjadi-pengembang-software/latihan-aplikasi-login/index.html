<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/styles/login-styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>
  <body>
    <main>
      <header class="logo-img">
        <img src="assets/images/dicoding-logo.png" alt="dicoding-logo" />
      </header>

      <form class="form" id="login-form">
        <label for="email" class="label">Email</label>
        <input type="email" id="email" class="input" />
        <label for="password" class="label">Password</label>
        <input type="password" id="password" class="input" />
        <button type="submit" class="button">Login</button>
      </form>

      <!-- Tambahkan elemen popup -->
      <div id="popup" class="popup">
        <p>Login gagal! Silakan cek kembali email dan password Anda.</p>
        <button id="closePopup">Tutup</button>
      </div>
    </main>

    <script src="assets/scripts/login-script.js"></script>
    <script src="assets/scripts/_init.js"></script>
  </body>
</html>
